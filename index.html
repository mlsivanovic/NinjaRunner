<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a0b2e">
    <title>Ninja Dash</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <!-- HUD tokom igre -->
            <div id="hud">
                <div id="progress-wrap"><div id="progress-bar"></div></div>
                <div id="score-board">Score: 0</div>
                <div id="lives-board">❤️❤️❤️</div>
                <div id="coins-board">💰 0</div>
                <div id="attempts-board">Attempt 1</div>
                <div id="practice-hint">Z = checkpoint</div>
                <div id="boss-hud"><div id="boss-hp-bar"></div></div>
            </div>

            <!-- Gornje kontrole -->
            <div id="top-controls">
                <button id="mute-btn" class="icon-btn">🔊</button>
                <button id="fx-btn" class="icon-btn">✨</button>
                <button id="pause-btn" class="icon-btn">⏸️</button>
            </div>

            <!-- Glavni meni -->
            <div id="menu-screen" class="screen">
                <h1 class="neon-title">NINJA<span>DASH</span></h1>
                <button id="play-btn" class="menu-btn">▶ Play</button>
                <button id="endless-btn" class="menu-btn">∞ Endless</button>
                <button id="menu-shop-btn" class="menu-btn">🛒 Shop</button>
            </div>

            <!-- Izbor nivoa -->
            <div id="level-select-screen" class="screen">
                <h2 class="neon-title small">Select Level</h2>
                <div id="levels-list"></div>
                <button id="practice-toggle" class="toggle-btn">🏋️ Practice: OFF</button>
                <button id="ls-back-btn" class="menu-btn ghost">← Back</button>
            </div>

            <!-- Nivo završen -->
            <div id="level-complete-screen" class="screen">
                <h1 class="neon-title small">LEVEL COMPLETE</h1>
                <div class="stars">★ ★ ★</div>
                <p id="lc-name" class="lc-name"></p>
                <p id="lc-coins" class="lc-coins"></p>
                <button id="next-level-btn" class="menu-btn">Next ▶</button>
                <button id="lc-menu-btn" class="menu-btn ghost">Menu</button>
            </div>

            <!-- Game over (endless) -->
            <div id="game-over-screen" class="screen">
                <h1 class="neon-title small danger">GAME OVER</h1>
                <div class="stats">
                    <p>Score: <span id="go-score">0</span></p>
                    <p>Best: <span id="go-best">0</span></p>
                </div>
                <button id="go-retry-btn" class="menu-btn">Try Again</button>
                <button id="go-menu-btn" class="menu-btn ghost">Menu</button>
            </div>

            <!-- Prodavnica -->
            <div id="shop-screen" class="screen">
                <h2 class="neon-title small">Shop <span id="shop-coins" class="shop-coins">💰 0</span></h2>
                <div id="skins-list"></div>
                <button id="close-shop-btn" class="menu-btn ghost">Close</button>
            </div>

            <!-- Pauza -->
            <div id="pause-screen" class="screen">
                <h2 class="neon-title small">PAUSED</h2>
                <button id="pause-resume-btn"  class="menu-btn">▶ Resume</button>
                <button id="pause-restart-btn" class="menu-btn">⟳ Restart</button>
                <button id="pause-levels-btn"  class="menu-btn">≡ Levels</button>
                <button id="pause-shop-btn"    class="menu-btn ghost">🛒 Shop</button>
                <button id="pause-menu-btn"    class="menu-btn ghost">⌂ Main Menu</button>
            </div>

            <div id="death-flash"></div>
        </div>
    </div>

    <script type="module" src="js/game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('SW registered'))
                    .catch(err => console.log('SW error', err));
            });
        }
    </script>
</body>
</html>
